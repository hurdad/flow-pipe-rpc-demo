services:
  nats:
    image: nats:latest
    network_mode: host
    command:
      - "--http_port=8222"
      - "--port=4222"
    volumes:
      - nats_data:/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    network_mode: host

  flow-pipe:
    build:
      context: .
      dockerfile: flow-pipe/Dockerfile
    network_mode: host
    depends_on:
      nats:
        condition: service_started
      jaeger:
        condition: service_started
    command:
      - /opt/flow-pipe/flows/rpc-pipeline.yaml
    environment:
      - NATS_URL=nats://127.0.0.1:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - FLOWPIPE_OBSERVABILITY_ENABLED=true
      - FLOWPIPE_TRACING_ENABLED=true
      - FLOWPIPE_OTEL_ENDPOINT=http://127.0.0.1:4317
      - OTEL_SERVICE_NAME=flow-pipe

  grpc-gateway:
    build:
      context: .
      dockerfile: grpc/Dockerfile
      target: gateway-runtime
    network_mode: host
    depends_on:
      nats:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      - NATS_URL=nats://127.0.0.1:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  grpc-client:
    build:
      context: .
      dockerfile: grpc/Dockerfile
      target: client-runtime
    network_mode: host
    depends_on:
      grpc-gateway:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      - GRPC_SERVER=127.0.0.1:50051
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc

volumes:
  nats_data:
    driver: local
