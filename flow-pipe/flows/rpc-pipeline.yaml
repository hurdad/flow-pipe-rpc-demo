observability:
  debug: true
  tracing_enabled: true
  tracing:
    stage_spans_enabled: true
    record_spans_enabled: true

queues:
  - name: q_in
    capacity: 256
  - name: q_out
    capacity: 256

stages:
  - type: nats_request_source
    name: source
    threads: 1
    output_queue: q_in
    config:
      subject: flow.jobs
      poll_timeout_ms: 1000

  - type: rpc_transform
    name: transform
    threads: 2
    input_queue: q_in
    output_queue: q_out
    config:
      processing_delay_ms: 1000

  - type: nats_reply_sink
    name: sink
    threads: 1
    input_queue: q_out
